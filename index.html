<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Strategy - Per-Token Reports</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0;font-size:13px;}
.header{padding:24px 28px 16px;border-bottom:1px solid #1e2330;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.header h1{font-size:20px;font-weight:600;color:#f8fafc;}
.header p{font-size:13px;color:#64748b;}
.layout{display:flex;height:calc(100vh - 74px);}
.sidebar{width:200px;flex-shrink:0;border-right:1px solid #1e2330;overflow-y:auto;padding:10px 8px;}
.sidebar-title{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#475569;padding:6px 8px 8px;}
.tok-btn{width:100%;text-align:left;padding:7px 10px;border:none;background:transparent;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:space-between;color:#94a3b8;font-size:13px;transition:background .15s;}
.tok-btn:hover{background:#1e2330;color:#e2e8f0;}
.tok-btn.active{background:#1e3a5f;color:#60a5fa;}
.tok-btn .roi{font-size:11px;font-weight:500;}
.tok-btn .roi.pos{color:#34d399;}
.tok-btn .roi.neg{color:#f87171;}
.main{flex:1;overflow-y:auto;padding:20px 24px;}
.token-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.token-badge{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;}
.token-name{font-size:18px;font-weight:600;color:#f1f5f9;}
.token-sub{font-size:12px;color:#64748b;margin-top:2px;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:18px;}
.stat-card{background:#161b27;border:1px solid #1e2330;border-radius:8px;padding:12px 14px;}
.stat-label{font-size:11px;color:#475569;margin-bottom:4px;}
.stat-val{font-size:17px;font-weight:600;color:#e2e8f0;}
.stat-sub{font-size:11px;color:#475569;margin-top:2px;}
.pos{color:#34d399;} .neg{color:#f87171;} .warn{color:#fbbf24;}
.chart-section{background:#161b27;border:1px solid #1e2330;border-radius:8px;padding:14px;margin-bottom:18px;}
.chart-title{font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:10px;letter-spacing:.04em;text-transform:uppercase;}
.chart-wrap{position:relative;width:100%;height:180px;}
.table-section{background:#161b27;border:1px solid #1e2330;border-radius:8px;overflow:hidden;}
.table-header{padding:12px 16px;border-bottom:1px solid #1e2330;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.table-title{font-size:12px;font-weight:600;color:#94a3b8;letter-spacing:.04em;text-transform:uppercase;}
.table-tools{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;}
.table-filters{display:flex;gap:6px;flex-wrap:wrap;}
.filter-btn{padding:4px 10px;border:1px solid #1e2330;background:transparent;border-radius:4px;cursor:pointer;font-size:11px;color:#64748b;transition:all .15s;}
.filter-btn:hover{background:#1e2330;color:#e2e8f0;}
.filter-btn.active{background:#1e3a5f;color:#60a5fa;border-color:#1e3a5f;}
.menu-btn{padding:4px 10px;border:1px solid #1e2330;background:transparent;border-radius:4px;cursor:pointer;font-size:11px;color:#94a3b8;transition:all .15s;}
.menu-btn:hover{background:#1e2330;color:#e2e8f0;}
.menu-btn.secondary{font-size:10px;color:#64748b;}
.column-picker{position:relative;}
.column-menu{display:none;position:absolute;right:0;top:calc(100% + 8px);width:340px;max-height:420px;overflow:auto;background:#0f1117;border:1px solid #273244;border-radius:10px;box-shadow:0 20px 40px rgba(0,0,0,.35);padding:12px;z-index:30;}
.column-menu.open{display:block;}
.column-menu-title{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#94a3b8;margin-bottom:6px;}
.column-menu-note{font-size:11px;color:#64748b;line-height:1.5;margin-bottom:10px;}
.column-list{display:flex;flex-direction:column;gap:8px;}
.column-item{display:flex;gap:10px;align-items:flex-start;padding:8px;border:1px solid #1e2330;border-radius:8px;background:#161b27;cursor:pointer;}
.column-item input{margin-top:2px;accent-color:#60a5fa;}
.column-copy{display:flex;flex-direction:column;gap:3px;}
.column-label{font-size:12px;font-weight:600;color:#e2e8f0;}
.column-desc{font-size:11px;color:#64748b;line-height:1.4;}
.column-actions{display:flex;justify-content:flex-end;margin-top:10px;}
.trade-table{width:100%;border-collapse:collapse;}
.trade-table th{text-align:left;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#475569;padding:8px 12px;border-bottom:1px solid #1e2330;white-space:nowrap;position:sticky;top:0;background:#161b27;}
.trade-table td{padding:7px 12px;border-bottom:1px solid #111827;font-size:12px;color:#94a3b8;white-space:nowrap;}
.trade-table tr:last-child td{border-bottom:none;}
.trade-table tr:hover td{background:#1e2330;}
.trade-row{cursor:default;}
.trade-action-cell{width:72px;text-align:right;}
.info-btn{padding:4px 8px;border:1px solid #2a3a52;background:#101826;color:#8fb4ff;border-radius:6px;font-size:11px;cursor:pointer;transition:all .15s;opacity:0;pointer-events:none;}
.info-btn:hover{background:#16243a;color:#dbeafe;border-color:#35527f;}
.trade-row:hover .info-btn,.trade-row:focus-within .info-btn{opacity:1;pointer-events:auto;}
.trade-table td.num{color:#e2e8f0;}
.pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:3px;font-weight:600;}
.pill-long{background:#052e16;color:#4ade80;}
.pill-short{background:#2d0c0c;color:#f87171;}
.win-dot{display:inline-block;width:6px;height:6px;border-radius:50%;}
.table-scroll{overflow-x:auto;max-height:520px;overflow-y:auto;}
.legend{display:flex;gap:14px;font-size:11px;color:#475569;margin-bottom:6px;}
.legend span{display:flex;align-items:center;gap:4px;}
.legend .dot{width:8px;height:8px;border-radius:50%;}
.hover-card{position:fixed;right:18px;bottom:18px;width:min(420px,calc(100vw - 36px));max-height:70vh;overflow:auto;background:rgba(15,17,23,.97);border:1px solid #273244;border-radius:12px;box-shadow:0 20px 40px rgba(0,0,0,.45);padding:14px;z-index:40;display:none;backdrop-filter:blur(8px);}
.hover-card.open{display:block;}
.hover-header{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #1e2330;}
.hover-head-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.hover-title{font-size:14px;font-weight:600;color:#f8fafc;}
.hover-sub{font-size:11px;color:#64748b;margin-top:4px;}
.hover-close{padding:5px 9px;border:1px solid #273244;background:#101826;color:#94a3b8;border-radius:8px;cursor:pointer;font-size:11px;line-height:1;}
.hover-close:hover{background:#16243a;color:#e2e8f0;}
.hover-list{display:flex;flex-direction:column;gap:8px;}
.hover-row{display:grid;grid-template-columns:130px 1fr;gap:10px;align-items:flex-start;background:#161b27;border:1px solid #1e2330;border-radius:8px;padding:10px;}
.hover-key{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#94a3b8;}
.hover-main{display:flex;flex-direction:column;gap:5px;min-width:0;}
.hover-value{font-size:13px;font-weight:600;color:#e2e8f0;word-break:break-word;}
.hover-desc{font-size:11px;color:#64748b;line-height:1.4;}
.chart-hover-tooltip{position:fixed;left:18px;top:18px;width:min(560px,calc(100vw - 36px));max-height:72vh;overflow:auto;background:rgba(15,17,23,.98);border:1px solid #273244;border-radius:12px;box-shadow:0 20px 40px rgba(0,0,0,.45);padding:14px;z-index:35;display:none;backdrop-filter:blur(8px);}
.chart-hover-tooltip.open{display:block;}
.chart-tip-header{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #1e2330;}
.chart-tip-title{font-size:14px;font-weight:600;color:#f8fafc;}
.chart-tip-sub{font-size:11px;color:#64748b;margin-top:4px;}
.chart-cap-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:10px;}
.chart-cap-card{background:#161b27;border:1px solid #1e2330;border-radius:8px;padding:10px;}
.chart-cap-label{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#94a3b8;}
.chart-cap-value{font-size:13px;font-weight:700;color:#e2e8f0;margin-top:4px;word-break:break-word;}
.chart-kv-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}
.chart-kv-row{background:#161b27;border:1px solid #1e2330;border-radius:8px;padding:10px;}
.chart-kv-key{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#94a3b8;}
.chart-kv-value{font-size:12px;font-weight:600;color:#e2e8f0;margin-top:4px;word-break:break-word;}
@media (max-width: 900px) {
  .layout{display:block;height:auto;}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid #1e2330;max-height:220px;}
  .hover-card{left:18px;right:18px;width:auto;}
  .chart-hover-tooltip{left:18px;right:18px;width:auto;}
  .column-menu{left:0;right:auto;width:min(340px,calc(100vw - 40px));}
  .hover-row{grid-template-columns:1fr;gap:6px;}
  .chart-cap-grid{grid-template-columns:repeat(2,minmax(0,1fr));}
  .chart-kv-grid{grid-template-columns:1fr;}
}
@media (hover:none) {
  .info-btn{opacity:1;pointer-events:auto;}
}
</style>
</head>

const FIELD_DEFS = [{"key":"n","label":"#","description":"Sequential trade number within the selected token report."},{"key":"entry_date","label":"Entry","description":"UTC date when the trade opened."},{"key":"exit_date","label":"Exit","description":"UTC date when the trade closed."},{"key":"side","label":"Side","description":"Trade direction. Long benefits from rising price, short from falling price."},{"key":"entry_price","label":"Entry $","description":"Executed entry price per token."},{"key":"exit_price","label":"Exit $","description":"Executed exit price per token."},{"key":"price_chg_pct","label":"Delta %","description":"Directional price move from entry to exit for this trade."},{"key":"entry_notional","label":"Notional","description":"Dollar value put into the trade at entry."},{"key":"leverage","label":"Lev","description":"Effective leverage used at entry after all strategy adjustments."},{"key":"duration_hours","label":"Hrs","description":"How long the trade stayed open, in hours."},{"key":"gross_pnl","label":"Gross PnL","description":"Profit or loss before funding adjustments."},{"key":"funding_pnl","label":"Funding","description":"Net funding paid or received while the trade was open."},{"key":"net_pnl","label":"Net PnL","description":"Final profit or loss after funding and modeled execution costs."},{"key":"return_pct","label":"Ret%","description":"Net trade return as a percent of entry notional."},{"key":"fear_greed","label":"F&G","description":"Fear and Greed index reading captured at trade entry."},{"key":"cap_before","label":"Cap before","description":"Strategy equity immediately before the trade opened."},{"key":"cap_after","label":"Cap after","description":"Strategy equity immediately after the trade closed."},{"key":"exit_reason","label":"Exit reason","description":"Rule or condition that closed the trade."}];
const STORAGE_KEY = 'top20_report_visible_fields_v3';
let currentSym = TOKENS.length ? TOKENS[0].symbol : '';
let activeFilter = 'all';
let chartInst = null;
let visibleFields = loadVisibleFields();

function fmt(v,d=2){return (v>=0?'+':'')+v.toFixed(d);}
function fmtD(v){return (v>=0?'+$':'-$')+Math.abs(v).toLocaleString('en',{maximumFractionDigits:2});}
function fmtDollar(v,d=2){return '$'+Number(v).toLocaleString('en',{minimumFractionDigits:d,maximumFractionDigits:d});}
function escapeHtml(value){return String(value == null ? '' : value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function loadVisibleFields(){
  try {
    const raw = window.localStorage.getItem(STORAGE_KEY);
    if(raw) {
      const parsed = JSON.parse(raw);
      if(Array.isArray(parsed)) {
        const allowed = FIELD_DEFS.map(function(field) { return field.key; });
        const filtered = parsed.filter(function(key) { return allowed.indexOf(key) !== -1; });
        if(filtered.length) return filtered;
      }
    }
  } catch (err) {}
  return FIELD_DEFS.map(function(field) { return field.key; });
}

function saveVisibleFields(){
  try { window.localStorage.setItem(STORAGE_KEY, JSON.stringify(visibleFields)); } catch (err) {}
}

function getVisibleFieldDefs(){
  return FIELD_DEFS.filter(function(field) { return visibleFields.indexOf(field.key) !== -1; });
}

function isColumnVisible(key){return visibleFields.indexOf(key) !== -1;}

function toggleColumnMenu(event){
  if(event) event.stopPropagation();
  const menu = document.getElementById('columnMenu');
  if(menu) menu.classList.toggle('open');
}

function closeColumnMenu(){
  const menu = document.getElementById('columnMenu');
  if(menu) menu.classList.remove('open');
}

function setColumnVisible(key, checked){
  if(checked) {
    if(!isColumnVisible(key)) visibleFields = visibleFields.concat([key]);
  } else {
    const next = visibleFields.filter(function(item) { return item !== key; });
    if(!next.length) return;
    visibleFields = next;
  }
  saveVisibleFields();
  renderToken();
}

function showAllColumns(){
  visibleFields = FIELD_DEFS.map(function(field) { return field.key; });
  saveVisibleFields();
  renderToken();
}

function buildSidebar(){
  const el = document.getElementById('tokenList');
  el.innerHTML = TOKENS.map(function(t) {
    const roiCls = t.roi_pct >= 0 ? 'pos' : 'neg';
    const roiStr = (t.roi_pct >= 0 ? '+' : '') + Math.round(t.roi_pct) + '%';
    return `<button class="tok-btn${t.symbol===currentSym?' active':''}" onclick="selectToken('${t.symbol}')">
      <span>${t.symbol}</span><span class="roi ${roiCls}">${roiStr}</span>
    </button>`;
  }).join('');
}

function selectToken(sym){
  currentSym = sym;
  activeFilter = 'all';
  buildSidebar();
  renderToken();
}

function setFilter(f){
  activeFilter = f;
  renderToken();
}

function getFieldValue(key, tr){
  switch(key) {
    case 'n': return String(tr.n);
    case 'entry_date': return tr.entry_date;
    case 'exit_date': return tr.exit_date;
    case 'side': return tr.side.toUpperCase();
    case 'entry_price': return fmtDollar(tr.entry_price, 4);
    case 'exit_price': return fmtDollar(tr.exit_price, 4);
    case 'price_chg_pct': return fmt(tr.price_chg_pct, 1) + '%';
    case 'entry_notional': return '$' + Math.round(tr.entry_notional).toLocaleString();
    case 'leverage': return tr.leverage.toFixed(2) + 'x';
    case 'duration_hours': return String(tr.duration_hours);
    case 'gross_pnl': return (tr.gross_pnl >= 0 ? '+$' : '-$') + Math.abs(tr.gross_pnl).toLocaleString('en', {maximumFractionDigits:2});
    case 'funding_pnl': return (tr.funding_pnl >= 0 ? '+$' : '-$') + Math.abs(tr.funding_pnl).toLocaleString('en', {maximumFractionDigits:2});
    case 'net_pnl': return (tr.net_pnl >= 0 ? '+$' : '-$') + Math.abs(tr.net_pnl).toLocaleString('en', {maximumFractionDigits:2});
    case 'return_pct': return fmt(tr.return_pct, 1) + '%';
    case 'fear_greed': return String(Math.round(tr.fear_greed));
    case 'cap_before': return '$' + Math.round(tr.cap_before).toLocaleString();
    case 'cap_after': return '$' + Math.round(tr.cap_after).toLocaleString();
    case 'exit_reason': return tr.exit_reason;
    default: return '';
  }
}

function getFieldTone(key, tr){
  if(['gross_pnl','net_pnl','return_pct'].indexOf(key) !== -1) return tr[key] >= 0 ? 'pos' : 'neg';
  if(key === 'funding_pnl') return tr.funding_pnl >= 0 ? 'pos' : 'neg';
  if(key === 'price_chg_pct') return tr.price_chg_pct >= 0 ? 'pos' : 'neg';
  if(key === 'cap_after') return tr.cap_after >= tr.cap_before ? 'pos' : 'neg';
  return '';
}

function buildCell(field, tr){
  const sideCls = tr.side === 'long' ? 'pill-long' : 'pill-short';
  const dot = tr.win ? '#34d399' : '#f87171';
  switch(field.key) {
    case 'n':
      return `<td><span class="win-dot" style="background:${dot};"></span> ${tr.n}</td>`;
    case 'side':
      return `<td><span class="pill ${sideCls}">${tr.side.toUpperCase()}</span></td>`;
    case 'entry_date':
    case 'exit_date':
    case 'entry_price':
    case 'exit_price':
    case 'entry_notional':
    case 'cap_before':
      return `<td class="num">${getFieldValue(field.key, tr)}</td>`;
    case 'price_chg_pct':
    case 'gross_pnl':
    case 'funding_pnl':
    case 'net_pnl':
    case 'return_pct':
    case 'cap_after':
      return `<td class="${getFieldTone(field.key, tr)}">${getFieldValue(field.key, tr)}</td>`;
    case 'fear_greed':
      return `<td style="color:#475569;">${getFieldValue(field.key, tr)}</td>`;
    case 'exit_reason':
      return `<td style="color:#64748b;">${escapeHtml(getFieldValue(field.key, tr))}</td>`;
    default:
      return `<td>${getFieldValue(field.key, tr)}</td>`;
  }
}

function buildHeaderCells(){
  return getVisibleFieldDefs().map(function(field) {
    return `<th title="${escapeHtml(field.description)}">${escapeHtml(field.label)}</th>`;
  }).join('') + '<th class="trade-action-cell">Info</th>';
}

function buildRow(tr){
  return `<tr class="trade-row">${getVisibleFieldDefs().map(function(field) { return buildCell(field, tr); }).join('')}<td class="trade-action-cell"><button class="info-btn" onclick="showTradeHover(${tr.n}, event)">Info</button></td></tr>`;
}

function renderColumnMenuMarkup(){
  return `<div class="column-picker" id="columnPicker">
    <button class="menu-btn" onclick="toggleColumnMenu(event)">Columns (${getVisibleFieldDefs().length}/${FIELD_DEFS.length})</button>
    <div class="column-menu" id="columnMenu">
      <div class="column-menu-title">Visible fields</div>
      <div class="column-menu-note">Choose which table columns stay visible. Full field descriptions open from the row Info button when you want them.</div>
      <div class="column-list">
        ${FIELD_DEFS.map(function(field) {
          return `<label class="column-item">
            <input type="checkbox" ${isColumnVisible(field.key) ? 'checked' : ''} onchange="setColumnVisible('${field.key}', this.checked)">
            <span class="column-copy">
              <span class="column-label">${escapeHtml(field.label)}</span>
              <span class="column-desc">${escapeHtml(field.description)}</span>
            </span>
          </label>`;
        }).join('')}
      </div>
      <div class="column-actions">
        <button class="menu-btn secondary" onclick="showAllColumns()">Show all</button>
      </div>
    </div>
  </div>`;
}

function showTradeHover(tradeNumber, event){
  if(event) event.stopPropagation();
  const token = TOKENS.find(function(item) { return item.symbol === currentSym; });
  if(!token) return;
  const trade = (token.trades || []).find(function(item) { return item.n === tradeNumber; });
  const card = document.getElementById('tradeHoverCard');
  if(!trade || !card) return;
  card.innerHTML = `<div class="hover-header">
      <div class="hover-head-row">
        <div>
          <div class="hover-title">${escapeHtml(token.symbol)} trade #${trade.n}</div>
          <div class="hover-sub">${escapeHtml(trade.entry_date)} to ${escapeHtml(trade.exit_date)} · ${escapeHtml(trade.side.toUpperCase())}</div>
        </div>
        <button class="hover-close" onclick="hideTradeHover()">Close</button>
      </div>
    </div>
    <div class="hover-list">
      ${FIELD_DEFS.map(function(field) {
        const tone = getFieldTone(field.key, trade);
        return `<div class="hover-row">
          <div class="hover-key">${escapeHtml(field.label)}</div>
          <div class="hover-main">
            <div class="hover-value ${tone}">${escapeHtml(getFieldValue(field.key, trade))}</div>
            <div class="hover-desc">${escapeHtml(field.description)}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  card.classList.add('open');
}

function hideTradeHover(){
  const card = document.getElementById('tradeHoverCard');
  if(card) {
    card.classList.remove('open');
    card.innerHTML = '';
  }
}

function hideChartTooltip(){
  const card = document.getElementById('chartHoverTooltip');
  if(card) {
    card.classList.remove('open');
    card.innerHTML = '';
  }
}

function positionFloatingTooltip(card, x, y){
  const pad = 12;
  let left = x + 18;
  let top = y + 18;
  const rect = card.getBoundingClientRect();
  if(left + rect.width > window.innerWidth - pad) left = Math.max(pad, x - rect.width - 18);
  if(top + rect.height > window.innerHeight - pad) top = Math.max(pad, y - rect.height - 18);
  card.style.left = left + 'px';
  card.style.top = top + 'px';
}

        ${detailKeys.map(function(key) {
          const field = FIELD_DEFS.find(function(item) { return item.key === key; });
          return `<div class="chart-kv-row"><div class="chart-kv-key">${escapeHtml(field.label)}</div><div class="chart-kv-value ${getFieldTone(key, trade)}">${escapeHtml(getFieldValue(key, trade))}</div></div>`;
        }).join('')}
      </div>`;
  }

  card.classList.add('open');
  const rect = context.chart.canvas.getBoundingClientRect();
  positionFloatingTooltip(card, rect.left + tooltip.caretX, rect.top + tooltip.caretY);
}

function drawChart(t){
  if(chartInst){chartInst.destroy();chartInst=null;}
  const trades = t.trades || [];
  if(!trades.length) return;
  if(typeof Chart !== 'function') return;
  const labels = ['Start'].concat(trades.map(function(x) { return '#' + x.n; }));
  const data = [t.starting_capital].concat(trades.map(function(x) { return x.cap_after; }));
  const ptColors = ['#60a5fa'].concat(trades.map(function(x) { return x.win ? '#34d399' : '#f87171'; }));
  const pointRadius = [3].concat(trades.map(function(x) { return Math.abs(x.net_pnl) > 500 ? 5 : 2; }));
  const ctx = document.getElementById('capChart').getContext('2d');
  chartInst = new Chart(ctx, {
    type:'line',
    data:{
      labels:labels,
      datasets:[{
        label:'Capital',
        data:data,
        borderColor:t.color,
        backgroundColor:t.color + '18',
        borderWidth:2,
        pointRadius:pointRadius,
        pointBackgroundColor:ptColors,
        pointBorderWidth:0,
        fill:true,
        tension:0.2
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          enabled:false,
          external:function(context) { renderChartTooltip(context, t, trades); }
        }
      },
      scales:{
        x:{grid:{display:false,color:'#1e2330'},ticks:{color:'#475569',maxTicksLimit:14,autoSkip:true,font:{size:10}}},
        y:{grid:{color:'#1e2330'},ticks:{color:'#475569',callback:function(v) { return '$' + (v>=1000 ? Math.round(v/1000) + 'k' : v); },font:{size:10}}}
      }
    }
  });
}

function renderToken(){
  const t = TOKENS.find(function(x) { return x.symbol === currentSym; });
  if(!t) return;
  const trades = t.trades || [];
  let filtered = trades;
  if(activeFilter === 'wins') filtered = trades.filter(function(x) { return x.win; });
  if(activeFilter === 'losses') filtered = trades.filter(function(x) { return !x.win; });
  if(activeFilter === 'long') filtered = trades.filter(function(x) { return x.side === 'long'; });
  if(activeFilter === 'short') filtered = trades.filter(function(x) { return x.side === 'short'; });

  document.getElementById('mainContent').innerHTML = `
    <div class="token-header">
      <div class="token-badge" style="background:${t.color}22;color:${t.color};">${t.symbol.slice(0,3)}</div>
      <div>
        <div class="token-name">${t.name} (${t.symbol})</div>
        <div class="token-sub">${t.total_trades} trades - ${Math.round(t.starting_capital)} start - ${t.longs}L / ${t.shorts}S - ${t.coverage_note}</div>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Final capital</div><div class="stat-val ${t.total_pnl>=0?'pos':'neg'}">$${Math.round(t.final_capital).toLocaleString()}</div><div class="stat-sub">Started $${Math.round(t.starting_capital)}</div></div>
      <div class="stat-card"><div class="stat-label">Total net PnL</div><div class="stat-val ${t.total_pnl>=0?'pos':'neg'}">${fmtD(t.total_pnl)}</div><div class="stat-sub">ROI: ${fmt(t.roi_pct,1)}%</div></div>
      <div class="stat-card"><div class="stat-label">Win rate</div><div class="stat-val">${t.win_rate}%</div><div class="stat-sub">${t.wins}W / ${t.losses}L</div></div>
      <div class="stat-card"><div class="stat-label">Profit factor</div><div class="stat-val ${t.profit_factor>=1.5?'pos':t.profit_factor>=1?'warn':'neg'}">${t.profit_factor.toFixed(2)}x</div><div class="stat-sub">Edge quality</div></div>
      <div class="stat-card"><div class="stat-label">Avg win</div><div class="stat-val pos">${fmtD(t.avg_win)}</div><div class="stat-sub">Per winner</div></div>
      <div class="stat-card"><div class="stat-label">Avg loss</div><div class="stat-val neg">${fmtD(t.avg_loss)}</div><div class="stat-sub">Per loser</div></div>
      <div class="stat-card"><div class="stat-label">Best trade</div><div class="stat-val pos">${fmtD(t.best_trade)}</div></div>
      <div class="stat-card"><div class="stat-label">Worst trade</div><div class="stat-val neg">${fmtD(t.worst_trade)}</div></div>
      <div class="stat-card"><div class="stat-label">Long WR</div><div class="stat-val">${t.long_wr}%</div><div class="stat-sub">${t.longs} longs</div></div>
      <div class="stat-card"><div class="stat-label">Short WR</div><div class="stat-val">${t.short_wr}%</div><div class="stat-sub">${t.shorts} shorts</div></div>
      <div class="stat-card"><div class="stat-label">Max drawdown</div><div class="stat-val neg">${t.max_drawdown_pct.toFixed(2)}%</div><div class="stat-sub">Strategy curve</div></div>
      <div class="stat-card"><div class="stat-label">Buy and hold</div><div class="stat-val ${t.buy_hold_roi>=0?'pos':'neg'}">${fmt(t.buy_hold_roi,1)}%</div><div class="stat-sub">Same period</div></div>
    </div>

    <div class="chart-section">
      <div class="chart-title">Capital growth - trade by trade</div>
      <div class="legend">
        <span><span class="dot" style="background:#34d399;"></span>Win</span>
        <span><span class="dot" style="background:#f87171;"></span>Loss</span>
      </div>
      ${
        trades.length
          ? '<div class="chart-wrap"><canvas id="capChart" role="img" aria-label="Capital growth chart"></canvas></div>'
          : '<p style="color:#475569;padding:20px 0;">No closed trades were recorded for this token.</p>'
      }
    </div>

    <div class="table-section">
      <div class="table-header">
        <div class="table-title">${filtered.length} of ${trades.length} trades</div>
        <div class="table-tools">
          <div class="table-filters">
            ${
              ['all','wins','losses','long','short'].map(function(f) {
                const label = f === 'all' ? 'All' : f.charAt(0).toUpperCase() + f.slice(1);
                return `<button class="filter-btn${activeFilter===f?' active':''}" onclick="setFilter('${f}')">${label}</button>`;
              }).join('')
            }
          </div>
          ${renderColumnMenuMarkup()}
        </div>
      </div>
      <div class="table-scroll">
        <table class="trade-table">
          <thead><tr>${buildHeaderCells()}</tr></thead>
          <tbody>${filtered.map(function(tr) { return buildRow(tr); }).join('')}</tbody>
        </table>
      </div>
    </div>
  `;

  hideTradeHover();
  hideChartTooltip();
  closeColumnMenu();
  if(trades.length) drawChart(t);
}

document.addEventListener('click', function(event) {
  const picker = document.getElementById('columnPicker');
  if(picker && !picker.contains(event.target)) closeColumnMenu();
});

document.addEventListener('keydown', function(event) {
  if(event.key === 'Escape') {
    closeColumnMenu();
    hideTradeHover();
    hideChartTooltip();
  }
});

buildSidebar();
renderToken();
</script>
</body>
</html>
